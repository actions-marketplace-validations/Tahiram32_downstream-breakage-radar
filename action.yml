name: "BreakGuard"
description: "Detects breaking changes before release and generates migration notes."
author: "Tahiram32"
branding:
  icon: 'shield'
  color: 'yellow'

inputs:
  base-ref:
    description: "The base git ref to diff against."
    required: false
    default: "origin/main"
  format:
    description: "The output format (text, json, markdown)."
    required: false
    default: "markdown"
  fail-on:
    description: "The risk level at which to fail the step (none, low, medium, high)."
    required: false
    default: "high"
  draft-release:
    description: "Automatically draft a GitHub release with the generated notes."
    required: false
    default: "false"
  changelog:
    description: "Generate a markdown API changelog (breakguard-changelog.md)."
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: "3.11"

    - name: Install package
      shell: bash
      run: python -m pip install -e ${{ github.action_path }}

    - name: Run breakage radar
      shell: bash
      id: scan
      run: |
        # Generate inline annotations first
        breakguard --repo ${{ github.workspace }} --base ${{ inputs.base-ref }} --format github --fail-on none
        
        # Build command for main report
        CMD="breakguard --repo ${{ github.workspace }} --base ${{ inputs.base-ref }} --format ${{ inputs.format }} --fail-on ${{ inputs.fail-on }}"
        if [ "${{ inputs.draft-release }}" = "true" ]; then
          CMD="$CMD --draft-release"
        fi
        if [ "${{ inputs.changelog }}" = "true" ]; then
          CMD="$CMD --changelog"
        fi
        
        # Run and capture output
        OUTPUT=$(eval $CMD)
        EXIT_CODE=$?
        
        # Save output to a file for potential comment usage
        echo "$OUTPUT" > breakage-report.md
        
        # Inject beautiful markdown report directly into GitHub UI
        echo "## 🛡️ BreakGuard Downstream Impact Report" >> $GITHUB_STEP_SUMMARY
        echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY
        
        exit $EXIT_CODE
      env:
        GH_TOKEN: ${{ github.token }}
